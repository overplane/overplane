# GoReleaser configuration for the public overplane repo.
# Runs from .github/workflows/release.yml on v* tag pushes (or manual dispatch).
version: 2

project_name: overplane

before:
  hooks:
    - go mod download
    - go mod verify

builds:
  - id: overplane
    main: ./cmd/overplane
    binary: overplane
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -buildid=
      - -X github.com/overplane/overplane/internal/platform/version.Version={{ .Version }}
      - -X github.com/overplane/overplane/internal/platform/version.Commit={{ .ShortCommit }}
      - -X github.com/overplane/overplane/internal/platform/version.Date={{ .CommitDate }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

# Compress binaries in place before they are uploaded. UPX cannot safely
# handle every target: packed darwin binaries are killed by Gatekeeper on
# modern macOS, and windows/arm64 PE is unsupported — those ship unpacked.
upx:
  - enabled: true
    goos: [linux]
    goarch: [amd64, arm64]
    compress: best
    lzma: true
  - enabled: true
    goos: [windows]
    goarch: [amd64]
    compress: best
    lzma: true

# Attach the (upx-packed) executables directly to the release — no tarballs.
# GoReleaser appends .exe for windows automatically.
archives:
  - id: default
    formats: ["binary"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Keyless (OIDC) signature of the checksum file via cosign; verifiable against
# the GitHub Actions identity without any key material in the repo.
signs:
  - cmd: cosign
    artifacts: checksum
    certificate: "${artifact}.pem"
    output: true
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '(?i)^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '(?i)^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Synced imports
      regexp: '^sync:.+$'
      order: 2
    - title: Other changes
      order: 999

release:
  draft: true
  prerelease: auto
  footer: |
    ---
    Assets are bare executables (upx-packed where supported), not tarballs:
    download the one for your platform, `chmod +x` it (unix), and run it.

    **Verify the artifacts**

    ```sh
    sha256sum --ignore-missing -c checksums.txt

    cosign verify-blob \
      --certificate checksums.txt.pem \
      --signature checksums.txt.sig \
      --certificate-identity-regexp 'https://github.com/{{ .Env.GITHUB_REPOSITORY }}' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      checksums.txt
    ```
